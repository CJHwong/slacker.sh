name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq libxml2-utils

      - name: ShellCheck
        run: shellcheck -x slacker.sh lib/*.sh actions/*.sh install.sh .dev/tests/*.sh

      - name: Tests (offline; also proves Linux portability)
        run: SLACKER_SKIP_LIVE=1 ./.dev/tests/run.sh
